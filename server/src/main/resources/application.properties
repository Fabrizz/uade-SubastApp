spring.application.name=subastapp

spring.jackson.mapper.accept-case-insensitive-enums=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database=postgresql
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG

server.address=0.0.0.0
server.port=${PORT:4002}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

springdoc.show-actuator=true
springdoc.show-login-endpoint=true
springdoc.show-oauth2-endpoints=true
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/docs

logging.level.org.springframework.security=info

application.security.jwt.secretKey: ${DB_JWT_KEY}
application.security.jwt.expiration: 86400000

# Empleado del sistema usado como verificador en el registro simulado
app.empleado-sistema-id=${EMPLEADO_SISTEMA_ID:1}

# Resend (envío de mails). Sin API key, el envío se loguea pero no rompe el flujo.
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:onboarding@resend.dev}